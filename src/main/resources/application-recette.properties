spring.application.name=kyrios

# Profil recette: base H2 persistante sur disque
spring.datasource.url=jdbc:h2:file:./data/kyriosdb;DB_CLOSE_DELAY=-1;MODE=MSSQLServer;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JSP Configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Force l'execution de schema.sql au demarrage (base H2 persistante)
spring.sql.init.mode=always

# Initialisation des donnees: une seule fois (DataInitializer ignore si donnees deja presentes)
app.init-data=true

# Console H2 (utile en recette)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
